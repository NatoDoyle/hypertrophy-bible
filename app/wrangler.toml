# Cloudflare Workers config. Free tier covers this app end-to-end:
# Workers (100k req/day), D1 (5 GB + 5M rows read/day), static assets (unlimited).
# No credit card, no non-commercial restriction, donation button allowed.
name = "hypertrophy-bible"
main = "worker.mjs"
compatibility_date = "2025-01-01"
workers_dev = true # keep the *.workers.dev URL working alongside the custom domain

# Custom domain (the zone is on the same Cloudflare account, so wrangler
# provisions DNS + TLS automatically on deploy). The workers.dev URL keeps working too.
routes = [
  { pattern = "hypertrophybible.com", custom_domain = true },
  { pattern = "www.hypertrophybible.com", custom_domain = true },
]

# From address for magic-link email (non-secret). The API key is a secret:
#   npx wrangler secret put RESEND_API_KEY
[vars]
MAIL_FROM = "The Hypertrophy Bible <hello@hypertrophybible.com>"

# Daily comeback-nudge sweep (worker.mjs `scheduled`): 16:00 UTC lands late
# morning in the Americas / evening in Europe — when a "train today?" note is
# actionable. At most 2 emails per lapse per user; pause/opt-out respected.
[triggers]
crons = ["0 16 * * *"]

# Frontend: everything in ./public is served straight from Cloudflare's edge.
# The Worker (main) only runs for routes the assets don't match — i.e. /api/*.
[assets]
directory = "./public"
binding = "ASSETS"

# Durable storage. Create the DB once, then paste its id here:
#   npx wrangler d1 create hypertrophy-bible
[[d1_databases]]
binding = "DB"
database_name = "hypertrophy-bible"
database_id = "37227640-f73e-44e1-a1d3-4899c10c1fab"
